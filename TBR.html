<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jyo</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    .bookshelf-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 20px;
      padding: 0;
    }

    .bookshelf-book {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      font-size: 0.85em;
    }

    .bookshelf-book img {
      width: 100px;
      height: auto;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      margin-bottom: 8px;
      transition: transform 0.2s;
    }

    .bookshelf-book img:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <header aria-label="Jyotsna Iyer"></header>

  <div class="menu-button" onclick="toggleMenu()" style="margin-bottom: 10px;">☰</div>
  <div id="nav-placeholder" style="margin-bottom: 10px;"></div>

  <div class="container" style="margin-top: 0; padding-top: 0;">
    <div class="content" style="text-align: left; margin-top: 0; padding-top: 0;">
      <section>
        <h2></h2>
        <div class="bookshelf-grid" id="bookshelf"></div>

        <p style="margin-top: 40px;"><b></b><br><br>
  
        </p>
      </section>
    </div>
  </div>

  <footer>
    <a href="https://twitter.com/jyotsna_iy">
      <img src="https://raw.githubusercontent.com/jyotsna-iy/jyotsna-iy.github.io/main/twitter.png" alt="Twitter Logo" />
    </a>
    <a href="https://www.are.na/jyotsna-_iy">
      <img src="https://raw.githubusercontent.com/jyotsna-iy/jyotsna-iy.github.io/main/arena.png" alt="Arena Logo" />
    </a>
    <a href="https://www.linkedin.com/in/jyotsna-iy/">
      <img src="https://raw.githubusercontent.com/jyotsna-iy/jyotsna-iy.github.io/main/linkedin.png" alt="LinkedIn Logo" />
    </a>
    <a href="https://jyotsna-iy.github.io/psa">
      <div class="psa-image"></div>
    </a>
  </footer>

  <script src="script.js"></script>

  <script>
    const books = [
      { title: "Bullshit Jobs", isbn: "9781501143311" },
      { title: "The Soul of a New Machine", isbn: "9780316491976" },
      { title: "The Human Condition", isbn: "9780226586601" },
      { title: "Discourse on Colonialism", isbn: "9781583670553" },
      { title: "Anti-Oedipus", isbn: "9780143105824" },
      { title: "The Utopia of Rules", isbn: "9781612193748" },
      { title: "Flatline Constructs", isbn: "9780312211253" },
      { title: "Race After Technology", isbn: "9781509526406" },
      { title: "The Bill Gates Problem", isbn: "9781668004383" },
      { title: "The Accumulation of Waste", isbn: "9780863726345" }
    ];

    const shelf = document.getElementById("bookshelf");

    books.forEach(book => {
      const bookDiv = document.createElement("div");
      bookDiv.className = "bookshelf-book";

      const img = document.createElement("img");
      img.src = `https://covers.openlibrary.org/b/isbn/${book.isbn}-M.jpg?default=false`;
      img.alt = `Cover of ${book.title}`;
      img.onerror = () => {
        img.style.display = "none";
      };

      const caption = document.createElement("div");
      caption.textContent = book.title;

      bookDiv.appendChild(img);
      bookDiv.appendChild(caption);
      shelf.appendChild(bookDiv);
    });
  </script>
</body>
</html>
