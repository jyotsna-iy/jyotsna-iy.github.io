    async function fetchISBN(title, author) {
      const url = `https://openlibrary.org/search.json?title=${encodeURIComponent(title)}&author=${encodeURIComponent(author)}`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        const doc = data.docs.find(d => d.isbn && d.isbn.length > 0);
        return doc ? doc.isbn[0] : null;
      } catch (err) {
        console.error(`Error fetching ISBN for "${title}"`, err);
        return null;
      }
    }

    async function renderBooks() {
      const shelf = document.getElementById("bookshelf");

      for (const book of books) {
        const bookDiv = document.createElement("div");
        bookDiv.className = "bookshelf-book";

        let img = document.createElement("img");
        const isbn = await fetchISBN(book.title, book.author);

        if (isbn) {
          img.src = `https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg?default=false`;
        } else {
          img.src = fallbackImage;
        }

        img.alt = `Cover of ${book.title}`;
        img.onerror = () => {
          img.src = fallbackImage;
        };

        const caption = document.createElement("div");
        caption.textContent = book.title;

        bookDiv.appendChild(img);
        bookDiv.appendChild(caption);
        shelf.appendChild(bookDiv);
      }
    }

    renderBooks();
