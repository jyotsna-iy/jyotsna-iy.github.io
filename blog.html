<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blog – Jyotsna Iyer</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .blog-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1rem;
      font-family: 'Georgia', serif;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 2rem;
    }

    .post-card {
      background-color: inherit;
      border: 1px solid white;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: left;
      cursor: pointer;
      transition: background-color 0.2s, box-shadow 0.2s;
      height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-decoration: none;
      color: black;
    }

    .post-card:hover {
      background-color: rgba(255, 255, 255, 0.05);
      box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.05);
    }

    .post-card h2 {
      font-size: 1.2rem;
      margin: 0 0 0.5rem 0;
      background-color: inherit;
      padding: 0.2rem 0.5rem;
      color: black;
    }

    .post-card .meta {
      font-size: 0.85rem;
      color: #666;
    }
  </style>
</head>
<body>
  <header aria-label="Jyotsna Iyer"></header>

  <div class="menu-button" onclick="toggleMenu()" style="margin-bottom: 10px;">☰</div>
  <div id="nav-placeholder" style="margin-bottom: 10px;"></div>

  <div class="blog-container">
    <a href="blog/post1.html" class="post-card">
      <h2>Lorem Ipsum</h2>
      <div class="meta">May 17, 2025</div>
    </a>

    <a href="blog/post2.html" class="post-card">
      <h2>Lorem Ipsum Dolor</h2>
      <div class="meta">May 10, 2025</div>
    </a>

    <a href="blog/post3.html" class="post-card">
      <h2>Another Blog Title</h2>
      <div class="meta">May 1, 2025</div>
    </a>

    <a href="blog/post4.html" class="post-card">
      <h2>Sample Post</h2>
      <div class="meta">April 20, 2025</div>
    </a>
  </div>

  <footer>
    <a href="https://twitter.com/jyotsna_iy"><img src="https://raw.githubusercontent.com/jyotsna-iy/jyotsna-iy.github.io/main/twitter.png" alt="Twitter Logo"></a>
    <a href="https://www.are.na/jyotsna-_iy"><img src="https://raw.githubusercontent.com/jyotsna-iy/jyotsna-iy.github.io/main/arena.png" alt="Arena Logo"></a>
    <a href="https://www.linkedin.com/in/jyotsna-iy/"><img src="https://raw.githubusercontent.com/jyotsna-iy/jyotsna-iy.github.io/main/linkedin.png" alt="LinkedIn Logo"></a>
    <a href="https://jyotsna-iy.github.io/psa">
      <div class="psa-image"></div>
    </a>
  </footer>

  <script src="script.js"></script>
</body>
</html>
